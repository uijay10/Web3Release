<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 项目事件认领审核</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-pending { background-color: #fef3c7; color: #d97706; }
        .status-approved { background-color: #d1fae5; color: #10b981; }
        .status-rejected { background-color: #fee2e2; color: #ef4444; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen">
        <header class="bg-white border-b sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-slate-800">项目事件认领管理后台</h1>
                <div class="flex items-center gap-6 text-sm">
                    <span class="text-slate-500">当前事件总数：3</span>
                    <button onclick="refreshData()"
                            class="px-5 py-2 bg-blue-600 text-white rounded-2xl hover:bg-blue-700">刷新数据</button>
                </div>
            </div>
        </header>

        <div class="max-w-7xl mx-auto px-8 py-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">项目方认领申请列表</h2>
                <div class="flex gap-3">
                    <select id="filter-status" onchange="filterClaims()" class="px-4 py-2 border border-slate-300 rounded-2xl">
                        <option value="all">全部状态</option>
                        <option value="pending">待审核</option>
                        <option value="approved">已通过</option>
                        <option value="rejected">已拒绝</option>
                    </select>
                </div>
            </div>

            <div id="claims-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        let claims = [
            {
                id: 1,
                eventTitle: "Colosseum Frontier 黑客松",
                projectName: "Solana 中文社区",
                contact: "@solana_cn",
                reason: "希望作为社区方提供中文直播和开发者招募支持",
                status: "pending",
                submitTime: "2026-04-01 14:30"
            },
            {
                id: 2,
                eventTitle: "Solana Accelerate USA",
                projectName: "Ocean Ventures",
                contact: "hello@ocean.ventures",
                reason: "希望作为赞助方参与线下活动",
                status: "approved",
                submitTime: "2026-03-28 09:15"
            }
        ];

        function renderClaims(filteredClaims) {
            const container = document.getElementById('claims-list');
            container.innerHTML = '';

            if (filteredClaims.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400">暂无认领申请</div>`;
                return;
            }

            filteredClaims.forEach(claim => {
                const statusClass = claim.status === 'pending' ? 'status-pending' :
                                    claim.status === 'approved' ? 'status-approved' : 'status-rejected';
                const statusText = claim.status === 'pending' ? '待审核' :
                                   claim.status === 'approved' ? '已通过' : '已拒绝';

                const html = `
                    <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                        <div class="flex justify-between">
                            <div>
                                <h3 class="font-semibold text-lg">${claim.eventTitle}</h3>
                                <p class="text-slate-600 mt-1">申请方：${claim.projectName}</p>
                            </div>
                            <div class="text-right">
                                <span class="px-4 py-1 rounded-2xl text-sm ${statusClass}">${statusText}</span>
                                <p class="text-xs text-slate-400 mt-2">${claim.submitTime}</p>
                            </div>
                        </div>
                        <div class="mt-4 text-sm text-slate-600">
                            联系方式：${claim.contact}<br>
                            认领理由：${claim.reason}
                        </div>
                        <div class="mt-6 flex gap-3">
                            ${claim.status === 'pending' ? `
                                <button onclick="approveClaim(${claim.id})" class="px-6 py-2 bg-green-600 text-white rounded-2xl hover:bg-green-700">通过</button>
                                <button onclick="rejectClaim(${claim.id})" class="px-6 py-2 bg-red-600 text-white rounded-2xl hover:bg-red-700">拒绝</button>
                            ` : ''}
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function approveClaim(id) {
            const claim = claims.find(c => c.id === id);
            if (claim) claim.status = 'approved';
            filterClaims();
        }

        function rejectClaim(id) {
            const claim = claims.find(c => c.id === id);
            if (claim) claim.status = 'rejected';
            filterClaims();
        }

        function filterClaims() {
            const status = document.getElementById('filter-status').value;
            const filtered = status === 'all' ? claims : claims.filter(c => c.status === status);
            renderClaims(filtered);
        }

        function refreshData() {
            alert("实际项目中这里会从后端拉取最新认领申请");
            filterClaims();
        }

        window.onload = () => renderClaims(claims);
    </script>
</body>
</html>
