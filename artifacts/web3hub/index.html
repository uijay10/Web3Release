<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 项目事件聚合</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-10 shadow-lg">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-4xl font-bold">AI 项目事件聚合</h1>
            <p class="mt-3 text-blue-100 text-lg">自动抓取 · 轻量认领 · 需求匹配</p>
        </div>
    </header>

    <nav class="bg-white shadow sticky top-0 z-50 border-b">
        <div class="max-w-5xl mx-auto px-6 py-4 flex flex-wrap gap-3 justify-center" id="nav-bar"></div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 py-10">
        <div id="status" class="text-center py-4 text-slate-400 text-sm"></div>
        <div id="event-list" class="space-y-6"></div>
    </div>

    <script>
        var allEvents = [];
        var activeCategory = "全部";
        var categories = ["全部","测试网","IDO/Launchpad","预售","融资公告","空投","招聘","节点招募","主网上线","代币解锁","交易所上线","链上任务","开发者专区"];

        function formatDate(s) {
            if (!s) return "日期待定";
            try { return new Date(s).toLocaleDateString("zh-CN", {year:"numeric",month:"long",day:"numeric"}); }
            catch(e) { return s; }
        }

        function createNavBar() {
            var nav = document.getElementById("nav-bar");
            nav.innerHTML = "";
            categories.forEach(function(cat) {
                var btn = document.createElement("button");
                var active = cat === activeCategory;
                btn.className = "px-5 py-2 rounded-full text-sm font-medium transition-all " + (active ? "bg-blue-600 text-white shadow" : "bg-white border border-slate-200 hover:bg-slate-100");
                btn.textContent = cat;
                btn.onclick = function() {
                    activeCategory = cat;
                    createNavBar();
                    var filtered = cat === "全部" ? allEvents : allEvents.filter(function(e) {
                        var cats = Array.isArray(e.category) ? e.category : [e.category || ""];
                        return cats.some(function(c) { return c && c.indexOf(cat) >= 0; });
                    });
                    renderEvents(filtered);
                };
                nav.appendChild(btn);
            });
        }

        function renderEvents(events) {
            var container = document.getElementById("event-list");
            var status = document.getElementById("status");
            container.innerHTML = "";
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="text-center py-20 text-slate-400">暂无事件数据</div>';
                return;
            }
            status.textContent = "共 " + events.length + " 条事件";
            events.forEach(function(ev) {
                var title = ev.title || "未命名事件";
                var cats = Array.isArray(ev.category) ? ev.category : [ev.category || "其他"];
                var catLabel = cats.join(" · ");
                var date = formatDate(ev.start_time);
                var desc = (ev.description || "暂无描述").substring(0, 180);
                var link = ev.source_url || ev.link || "#";
                var tags = Array.isArray(ev.tags) ? ev.tags : [];
                var imp = ev.importance || "medium";
                var impClass = imp === "high" ? "bg-red-100 text-red-700" : imp === "medium" ? "bg-yellow-100 text-yellow-700" : "bg-slate-100 text-slate-500";
                var impLabel = imp === "high" ? "🔥 重要" : imp === "medium" ? "📌 一般" : "💡 低";
                var tagHtml = tags.map(function(t) { return '<span class="px-3 py-1 bg-slate-100 text-slate-600 text-xs rounded-full">#' + t + '</span>'; }).join("");

                var card = document.createElement("div");
                card.className = "bg-white rounded-2xl shadow-sm hover:shadow-lg transition-all border border-slate-100 p-6";
                card.innerHTML =
                    '<div class="flex items-center justify-between mb-4">' +
                        '<div class="flex gap-2 flex-wrap">' +
                            '<span class="px-4 py-1 bg-blue-100 text-blue-700 text-xs font-semibold rounded-full">' + catLabel + '</span>' +
                            '<span class="px-4 py-1 ' + impClass + ' text-xs font-semibold rounded-full">' + impLabel + '</span>' +
                        '</div>' +
                        '<span class="text-slate-400 text-sm">' + date + '</span>' +
                    '</div>' +
                    '<h2 class="text-xl font-bold mb-3 text-slate-900">' +
                        '<a href="' + link + '" target="_blank" class="hover:text-blue-600">' + title + '</a>' +
                    '</h2>' +
                    '<p class="text-slate-600 leading-relaxed mb-4">' + desc + '</p>' +
                    '<div class="flex flex-wrap gap-2 mb-4">' + tagHtml + '</div>' +
                    '<div class="flex justify-between items-center text-sm border-t border-slate-100 pt-4">' +
                        '<span class="text-slate-400">来源：' + (ev.project_name || "未知") + '</span>' +
                        '<a href="' + link + '" target="_blank" class="text-blue-600 hover:underline font-medium">查看详情 →</a>' +
                    '</div>';
                container.appendChild(card);
            });
        }

        async function loadEvents() {
            var status = document.getElementById("status");
            var container = document.getElementById("event-list");
            container.innerHTML = '<div class="text-center py-20 text-slate-400">加载中...</div>';
            try {
                var res = await fetch("/extraction_result.json");
                if (!res.ok) throw new Error("HTTP " + res.status);
                var text = await res.text();
                if (text.trim()[0] === "<") throw new Error("返回的是 HTML 而非 JSON，请确认文件路径");
                allEvents = JSON.parse(text);
                createNavBar();
                renderEvents(allEvents);
            } catch(err) {
                container.innerHTML = '<div class="text-center py-20 text-red-500">加载失败：' + err.message + '</div>';
                console.error("loadEvents 失败:", err);
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            createNavBar();
            loadEvents();
        });
    </script>
</body>
</html>
