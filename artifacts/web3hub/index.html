<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 项目事件聚合</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { content: [], theme: { extend: {} } };
    </script>
    <style>
        #claim-modal { display: none; }
        #claim-modal.open { display: flex; }
        #toast-front {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px);
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0; pointer-events: none; z-index: 9999;
        }
        #toast-front.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <!-- Toast -->
    <div id="toast-front" class="px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg"></div>

    <!-- 项目方认领弹窗 -->
    <div id="claim-modal" class="fixed inset-0 z-50 items-center justify-center bg-black/40 backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-8 relative">
            <button onclick="closeClaimModal()"
                    class="absolute top-5 right-6 text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button>
            <h2 class="text-xl font-bold text-slate-800 mb-1">项目方认领申请</h2>
            <p id="modal-event-title" class="text-sm text-blue-600 mb-6"></p>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">项目名称 <span class="text-red-500">*</span></label>
                    <input id="modal-project-name" type="text" placeholder="你的项目或团队名称"
                           class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-400 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">联系方式 <span class="text-red-500">*</span></label>
                    <input id="modal-contact" type="text" placeholder="邮箱 / Twitter / Telegram"
                           class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-400 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">认领理由 <span class="text-red-500">*</span></label>
                    <textarea id="modal-reason" rows="3" placeholder="简述你希望参与该活动的方式和能提供的资源..."
                              class="w-full px-4 py-3 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-400 text-sm resize-none"></textarea>
                </div>
            </div>

            <div id="modal-error" class="hidden mt-3 text-sm text-red-500"></div>

            <div class="mt-6 flex gap-3 justify-end">
                <button onclick="closeClaimModal()"
                        class="px-6 py-2.5 text-sm text-slate-600 hover:text-slate-800 border border-slate-200 rounded-2xl transition-colors">取消</button>
                <button id="modal-submit-btn" onclick="submitProjectClaim()"
                        class="px-7 py-2.5 text-sm font-medium bg-purple-600 hover:bg-purple-700 text-white rounded-2xl transition-colors">
                    提交申请
                </button>
            </div>
        </div>
    </div>

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-12 shadow-lg">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-4xl font-bold">AI 项目事件聚合</h1>
            <p class="mt-3 text-blue-100 text-lg">自动抓取 · 轻量认领 · 需求匹配</p>
        </div>
    </header>

    <nav class="bg-white shadow sticky top-0 z-40 border-b">
        <div class="max-w-5xl mx-auto px-6 py-5 flex flex-wrap gap-3 justify-center" id="nav-bar"></div>
    </nav>

    <div class="max-w-5xl mx-auto px-6 pt-6 pb-4">
        <div class="relative max-w-2xl mx-auto">
            <input id="search-input" type="text"
                   placeholder="搜索标题、描述、标签..."
                   class="w-full px-6 py-3.5 pl-14 bg-white border border-slate-200 rounded-3xl focus:outline-none focus:border-blue-500 text-base shadow-sm">
            <span class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6">
        <div class="flex justify-between items-center mb-6">
            <span id="result-count" class="text-slate-500 text-sm font-medium">共 0 条事件</span>
            <div class="flex gap-2 items-center">
                <span class="text-xs text-slate-400 mr-1">排序：</span>
                <button id="sort-time" onclick="setSort('time')"
                        class="px-4 py-1.5 text-xs rounded-full bg-blue-600 text-white font-medium transition-all">最新时间</button>
                <button id="sort-importance" onclick="setSort('importance')"
                        class="px-4 py-1.5 text-xs rounded-full bg-white border border-slate-200 text-slate-600 hover:bg-slate-100 font-medium transition-all">重要程度</button>
            </div>
        </div>
        <div id="event-list" class="space-y-8 pb-12"></div>
    </div>

    <script>
        let allEvents = [];
        let claimedEvents    = JSON.parse(localStorage.getItem('claimedEvents') || '[]');
        let projectClaimed   = JSON.parse(localStorage.getItem('projectClaimed') || '[]');
        // 已提交申请（标题列表，防重复）
        let submittedClaims  = JSON.parse(localStorage.getItem('submittedClaimTitles') || '[]');

        let currentCategory  = '全部';
        let currentSearchTerm = '';
        let currentSort      = 'time';
        let pendingClaimTitle = '';

        const categories = [
            "全部", "测试网", "IDO/Launchpad", "预售", "融资公告",
            "空投", "招聘", "节点招募", "主网上线",
            "代币解锁", "交易所上线", "链上任务", "开发者专区", "我已认领"
        ];
        const RETENTION_DAYS = 60;

        // ── 工具函数 ──────────────────────────────────────────
        function formatDate(dateStr) {
            if (!dateStr) return '日期待定';
            const d = new Date(dateStr);
            return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
        }

        function isWithinRetention(dateStr) {
            if (!dateStr) return true;
            const today = new Date(); today.setHours(0,0,0,0);
            const diff = Math.ceil((new Date(dateStr) - today) / 86400000);
            return diff >= 0 && diff <= RETENTION_DAYS;
        }

        function showToastFront(msg, color = '#8b5cf6') {
            const t = document.getElementById('toast-front');
            t.textContent = msg;
            t.style.backgroundColor = color;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2800);
        }

        // ── 关注/认领状态 ────────────────────────────────────
        function isClaimed(title)        { return claimedEvents.includes(title); }
        function isProjectClaimed(title) { return projectClaimed.includes(title); }
        function isSubmitted(title)      { return submittedClaims.includes(title); }

        function toggleUserClaim(title) {
            if (claimedEvents.includes(title)) {
                claimedEvents = claimedEvents.filter(t => t !== title);
            } else {
                claimedEvents.push(title);
            }
            localStorage.setItem('claimedEvents', JSON.stringify(claimedEvents));
            refreshCurrentView();
        }

        // ── 弹窗 ─────────────────────────────────────────────
        function openClaimModal(title, eventLink) {
            if (isSubmitted(title)) {
                showToastFront('你已提交过该活动的认领申请，等待审核中');
                return;
            }
            pendingClaimTitle = title;
            document.getElementById('modal-event-title').textContent = '活动：' + title;
            document.getElementById('modal-project-name').value = '';
            document.getElementById('modal-contact').value = '';
            document.getElementById('modal-reason').value = '';
            document.getElementById('modal-error').classList.add('hidden');
            document.getElementById('modal-submit-btn').disabled = false;
            document.getElementById('modal-submit-btn').textContent = '提交申请';
            document.getElementById('claim-modal').classList.add('open');
        }

        function closeClaimModal() {
            document.getElementById('claim-modal').classList.remove('open');
        }

        function submitProjectClaim() {
            const projectName = document.getElementById('modal-project-name').value.trim();
            const contact     = document.getElementById('modal-contact').value.trim();
            const reason      = document.getElementById('modal-reason').value.trim();
            const errEl       = document.getElementById('modal-error');

            if (!projectName || !contact || !reason) {
                errEl.textContent = '请填写所有必填项';
                errEl.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('modal-submit-btn');
            btn.disabled = true;
            btn.textContent = '提交中…';

            // 构建对齐后台的标准数据结构
            const submission = {
                id: 'sub_' + Date.now(),
                eventTitle:   pendingClaimTitle,
                projectName,
                contact,
                reason,
                eventLink:    '#',
                status:       'pending',
                submitTime:   new Date().toLocaleString('zh-CN').slice(0, 16),
                reviewTime:   '',
                reviewNote:   ''
            };

            // 存入 localStorage（后台可读取）
            const existing = JSON.parse(localStorage.getItem('projectClaimSubmissions') || '[]');
            existing.unshift(submission);
            localStorage.setItem('projectClaimSubmissions', JSON.stringify(existing));

            // 防重复提交
            submittedClaims.push(pendingClaimTitle);
            localStorage.setItem('submittedClaimTitles', JSON.stringify(submittedClaims));

            // 标记为已认领（前端视图）
            if (!projectClaimed.includes(pendingClaimTitle)) {
                projectClaimed.push(pendingClaimTitle);
                localStorage.setItem('projectClaimed', JSON.stringify(projectClaimed));
            }

            // TODO: await fetch('/api/claims', { method: 'POST', body: JSON.stringify(submission) });

            setTimeout(() => {
                closeClaimModal();
                showToastFront('✅ 申请已提交，等待管理员审核');
                refreshCurrentView();
            }, 600);
        }

        // ── 导航 / 搜索 / 排序 ───────────────────────────────
        function setSort(mode) {
            currentSort = mode;
            document.getElementById('sort-time').className = `px-4 py-1.5 text-xs rounded-full font-medium transition-all ${
                mode === 'time' ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'
            }`;
            document.getElementById('sort-importance').className = `px-4 py-1.5 text-xs rounded-full font-medium transition-all ${
                mode === 'importance' ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'
            }`;
            refreshCurrentView();
        }

        function createNavBar() {
            const nav = document.getElementById('nav-bar');
            nav.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat;
                btn.dataset.category = cat;
                btn.className = `px-6 py-2.5 rounded-full text-sm font-medium transition-all ${
                    cat === '全部' ? 'bg-blue-600 text-white shadow-md' : 'bg-white hover:bg-slate-100 border border-slate-200'
                }`;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#nav-bar button').forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                        b.classList.add('bg-white', 'border', 'border-slate-200');
                    });
                    btn.classList.add('bg-blue-600', 'text-white', 'shadow-md');
                    btn.classList.remove('bg-white', 'border', 'border-slate-200');
                    currentCategory = cat;
                    refreshCurrentView();
                });
                nav.appendChild(btn);
            });
        }

        function setupSearch() {
            document.getElementById('search-input').addEventListener('input', e => {
                currentSearchTerm = e.target.value.toLowerCase().trim();
                refreshCurrentView();
            });
        }

        function refreshCurrentView() {
            let filtered = allEvents.filter(e => isWithinRetention(e.start_time));

            if (currentCategory === '我已认领') {
                filtered = filtered.filter(e => isClaimed(e.title) || isProjectClaimed(e.title));
            } else if (currentCategory !== '全部') {
                filtered = filtered.filter(e => {
                    const cats = Array.isArray(e.category) ? e.category : [e.category || ''];
                    return cats.some(c => c === currentCategory);
                });
            }

            if (currentSearchTerm) {
                filtered = filtered.filter(e => {
                    const text = `${e.title||''} ${e.description||''} ${e.project_name||e.source||''} ${(e.tags||[]).join(' ')}`.toLowerCase();
                    return text.includes(currentSearchTerm);
                });
            }

            if (currentSort === 'time') {
                filtered.sort((a, b) => new Date(a.start_time) - new Date(b.start_time));
            } else {
                const order = { '重要': 3, 'high': 3, '一般': 2, 'medium': 2, 'low': 1 };
                filtered.sort((a, b) => (order[b.importance] || 0) - (order[a.importance] || 0));
            }

            document.getElementById('result-count').textContent = `共 ${filtered.length} 条事件`;
            const container = document.getElementById('event-list');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-24 text-slate-400">
                        <div class="text-5xl mb-4">🔍</div>
                        <div class="text-lg font-medium mb-2">没有找到匹配的事件</div>
                        <div class="text-sm">尝试修改搜索词或切换其他栏目</div>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            renderEvents(filtered);
        }

        function renderEvents(events) {
            const container = document.getElementById('event-list');
            events.forEach(event => {
                const mainCat = Array.isArray(event.category) ? event.category[0] : (event.category || '其他');
                const desc = event.description || event.content || '暂无描述';
                const shortDesc = desc.length > 230 ? desc.substring(0, 227) + '...' : desc;

                const importanceHTML = event.importance
                    ? (event.importance.toLowerCase().includes('high') || event.importance.includes('重要')
                        ? `<span class="px-4 py-1 text-xs font-medium rounded-2xl bg-red-100 text-red-700">重要</span>`
                        : `<span class="px-4 py-1 text-xs font-medium rounded-2xl bg-amber-100 text-amber-700">一般</span>`)
                    : '';

                const userClaimed = isClaimed(event.title);
                const projClaimed = isProjectClaimed(event.title);
                const submitted   = isSubmitted(event.title);

                // 项目方认领按钮状态
                let projBtnLabel, projBtnClass;
                if (submitted || projClaimed) {
                    projBtnLabel = submitted ? '申请审核中' : '✓ 项目方已认领';
                    projBtnClass = 'bg-purple-500 text-white cursor-default';
                } else {
                    projBtnLabel = '项目方认领';
                    projBtnClass = 'bg-purple-100 text-purple-700 hover:bg-purple-200 cursor-pointer';
                }

                const cardHTML = `
                    <div class="bg-white rounded-3xl shadow-sm hover:shadow-2xl p-8 border border-slate-100 transition-all duration-300">
                        <div class="flex justify-between mb-6">
                            <div class="flex gap-3 flex-wrap">
                                <span class="px-5 py-1.5 bg-blue-100 text-blue-700 text-xs font-semibold rounded-3xl">${mainCat}</span>
                                ${importanceHTML}
                            </div>
                            <span class="text-slate-500 text-sm">${formatDate(event.start_time)}</span>
                        </div>

                        <h2 class="text-2xl font-semibold mb-5 text-slate-900">
                            <a href="${event.source_url || '#'}" target="_blank" class="hover:text-blue-600 transition-colors">${event.title}</a>
                        </h2>

                        <p class="text-slate-600 leading-relaxed mb-7">${shortDesc}</p>

                        <div class="flex flex-wrap gap-2 mb-8">
                            ${(event.tags || []).map(tag =>
                                `<span class="px-4 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs rounded-3xl transition-colors">#${tag}</span>`
                            ).join('')}
                        </div>

                        <div class="flex flex-wrap justify-between items-center pt-6 border-t border-slate-100 gap-3">
                            <span class="text-slate-500">来源：${event.project_name || event.source || '未知'}</span>
                            <div class="flex flex-wrap gap-2">
                                <a href="${event.source_url || '#'}" target="_blank"
                                   class="px-5 py-2 text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors">
                                    查看详情 →
                                </a>
                                <button onclick="toggleUserClaim('${event.title.replace(/'/g, "\\'")}')"
                                        class="px-5 py-2 text-sm rounded-2xl font-medium transition-all ${userClaimed ? 'bg-blue-500 text-white' : 'bg-blue-100 text-blue-700 hover:bg-blue-200'}">
                                    ${userClaimed ? '✓ 已关注' : '我要关注'}
                                </button>
                                <button onclick="${submitted || projClaimed ? '' : `openClaimModal('${event.title.replace(/'/g, "\\'")}', '${event.source_url || '#'}')`}"
                                        class="px-5 py-2 text-sm rounded-2xl font-medium transition-all ${projBtnClass}">
                                    ${projBtnLabel}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        async function loadEvents() {
            try {
                const res = await fetch('/extraction_result.json');
                if (!res.ok) throw new Error('加载失败');
                allEvents = await res.json();
                console.log('加载成功，共', allEvents.length, '条');
                refreshCurrentView();
            } catch (e) {
                console.error(e);
                document.getElementById('event-list').innerHTML = `<div class="text-red-500 text-center py-20">数据加载失败</div>`;
            }
        }

        // 点击弹窗背景关闭
        document.getElementById('claim-modal').addEventListener('click', function(e) {
            if (e.target === this) closeClaimModal();
        });

        window.onload = () => {
            createNavBar();
            setupSearch();
            loadEvents();
        };
    </script>
</body>
</html>
