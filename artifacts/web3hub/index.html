<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web3 Release - 最新机会</title>
    <style>
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background-color: #0a0a0a;
        color: #e0e0e0;
        margin: 0;
        padding: 20px;
      }
      .header {
        text-align: center;
        margin-bottom: 40px;
      }
      .header h1 {
        font-size: 2.4em;
        margin: 0 0 10px 0;
      }
      .event-card {
        background-color: #1a1a1a;
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 20px;
        border-left: 6px solid #00ff9d;
      }
      .title {
        font-size: 1.4em;
        margin: 0 0 12px 0;
        color: #fff;
      }
      .project {
        color: #00ff9d;
        font-weight: 600;
      }
      .description {
        margin: 16px 0;
        color: #ccc;
      }
      .meta {
        display: flex;
        gap: 15px;
        font-size: 0.95em;
        color: #aaa;
      }
      .category {
        background-color: #333;
        padding: 6px 14px;
        border-radius: 30px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Web3 Release</h1>
      <p>AI 自动抓取 · 最新 Web3 机会</p>
    </div>

    <div id="events-container">
      <p style="text-align: center; color: #666">正在加载事件数据...</p>
    </div>

    <script>
      async function loadEvents() {
        const container = document.getElementById("events-container");

        try {
          // 尝试多种路径加载 json 文件
          const possiblePaths = [
            "extraction_result.json",
            "./extraction_result.json",
            "../extraction_result.json",
            "/extraction_result.json",
          ];

          let events = [];
          for (let path of possiblePaths) {
            try {
              const response = await fetch(path, { cache: "no-cache" });
              if (response.ok) {
                events = await response.json();
                console.log(`成功从路径 ${path} 加载数据`);
                break;
              }
            } catch (e) {}
          }

          container.innerHTML = "";

          if (events.length === 0) {
            container.innerHTML = `<p style="color:#ff6666; text-align:center;">
            无法加载数据<br>
            请确保已运行 crawler_test.py 并生成了 extraction_result.json 文件
          </p>`;
            return;
          }

          events.forEach((event) => {
            const card = document.createElement("div");
            card.className = "event-card";
            card.innerHTML = `
            <h3 class="title">${event.title || "无标题"}</h3>
            <p class="project">${event.project_name || ""}</p>
            <p class="description">${event.description || "暂无描述"}</p>
            <div class="meta">
              <span class="category">${Array.isArray(event.category) ? event.category.join("、") : event.category || "其他"}</span>
              <span>开始时间: ${event.start_time ? event.start_time.substring(0, 10) : "待定"}</span>
            </div>
          `;
            container.appendChild(card);
          });
        } catch (err) {
          container.innerHTML = `<p style="color:#ff6666; text-align:center;">加载失败，请检查是否已运行 crawler_test.py</p>`;
        }
      }

      // 自动加载
      window.onload = loadEvents;
    </script>
  </body>
</html>
